<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>SOLAS - Safety of Life at Sea Convention</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reset.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/night.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="reveal">
        <div class="slides" id="presentation-core"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.js"></script>
    <script>
        // 1. Define the order of your separated files here
        const presentationFiles = [
            '00_intro.html',
            '01_table_of_contents.html',
            '02_chapter_1.html',
            '03_chapters_2-1_2-2.html',
            '04_chapter_3.html',
            '05_chapter_4.html',
            '06_chapter_5.html',
            '07_chapter_6.html',
            '08_chapter_7.html',
            '09_chapter_8.html',
            '10_chapter_9.html',
            '11_chapter_10_11.html',
            '12_chapter_12.html',
            '13_chapter_13.html',
            '14_chapter_14.html',
            '15_chapter_15.html',
            '16_conclusion.html'
        ];

        // 2. Fetch function to load them dynamically
        async function buildPresentation() {
            const coreContainer = document.getElementById('presentation-core');
            
            for (const file of presentationFiles) {
                const response = await fetch(file);
                const htmlContent = await response.text();
                coreContainer.innerHTML += htmlContent; 
            }

            // 3. Initialize Reveal.js
            Reveal.initialize({
                width: 1920,      
                height: 1080,     
                margin: 0,        
                minScale: 0.2,
                maxScale: 2.0,    
            });
             // Add this inside your buildPresentation function, after Reveal.initialize
            Reveal.on('slidechanged', event => {
                const footer = document.getElementById('teaching-footer');
                // If it's the very first slide (index 0), hide the footer
                if (event.indexh === 0) {
                    footer.style.opacity = '0';
                } else {
                    footer.style.opacity = '1';
                }
            });

            // 4. THE NEW ANIMATION SCRIPT
            // This listens for when you change slides and triggers the fade-in effect automatically
            Reveal.on('slidechanged', event => {
                const fragments = event.currentSlide.querySelectorAll('.auto-appear li');
                
                // Reset opacity to 0
                fragments.forEach(fragment => {
                    fragment.style.opacity = "0";
                });

                // Trigger the fade-in with a 1.5-second delay between each sentence
                fragments.forEach((fragment, index) => {
                    setTimeout(() => {
                        fragment.style.opacity = "1";
                    }, (index + 1) * 1500); 
                });
            });
        }

        // Run the builder
        buildPresentation();
    </script>
    <script>
        // ... (Your other fetch code and Reveal.initialize remain above this) ...

        // The Fast Auto-Animation Script
        Reveal.on('slidechanged', event => {
            const fragments = event.currentSlide.querySelectorAll('.auto-appear li');
            
            // Reset opacity to 0 instantly when changing slides
            fragments.forEach(fragment => {
                fragment.style.opacity = "0";
            });

            // Fade them in with a fast 400ms delay between each one
            fragments.forEach((fragment, index) => {
                setTimeout(() => {
                    fragment.style.opacity = "1";
                }, (index + 1) * 400); 
            });
        });
    </script>
    <body>
    <div id="teaching-footer">
        <div class="footer-left">© 2026 Ajarn Suphachai Suamchaiphum | SOLAS</div>
        <div class="footer-right">AMCOL - Asian Maritime Technological College</div>
    </div>

    <div class="reveal">
        <div class="slides" id="presentation-core">
            </div>
    </div>
    <script src="dist/reveal.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            // ... your other existing config settings ...
        });

        // Add your new Fullscreen/Landscape script right here
        document.getElementById('fullscreen-btn').addEventListener('click', function() {
            var doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen();
            }
        });
    </script>
</body>
<button id="fullscreen-btn" class="fs-button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        <span>Full Screen</span>
    </button>
</html>
